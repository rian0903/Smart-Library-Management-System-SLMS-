version: "3.8"

services:
  # =========================================
  # MySQL Database
  # =========================================
  db:
    image: mysql:8.0
    container_name: slms-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: slms_bireuen
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - slms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================
  # Backend - Laravel API
  # =========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: slms-backend
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      APP_NAME: "SLMS Perpustakaan Kabupaten Bireuen"
      APP_ENV: production
      APP_KEY: base64:JbGpH4FF6O/aGIQRUm4J9mZs4FwFYOaeORGsohu0e48=
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: slms_bireuen
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: database
    depends_on:
      db:
        condition: service_healthy
    networks:
      - slms-network

  # =========================================
  # Frontend - Next.js
  # =========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
        NEXT_PUBLIC_APP_NAME: "SLMS Perpustakaan Kabupaten Bireuen"
        NEXT_PUBLIC_APP_VERSION: "1.0.0"
    container_name: slms-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_APP_NAME: "SLMS Perpustakaan Kabupaten Bireuen"
      NEXT_PUBLIC_APP_VERSION: "1.0.0"
    depends_on:
      - backend
    networks:
      - slms-network

volumes:
  db_data:

networks:
  slms-network:
    driver: bridge
